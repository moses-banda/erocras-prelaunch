<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Erocras | 911 for Careers</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Supabase SDK (Defer for performance) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <!-- Header Logo -->
    <div class="header-logo">Erocras</div>

    <!-- Ambient / Belt Background -->
    <div class="ambient-background">
        <!-- Loop for Top Belt -->
        <div class="belt-row belt-top">
            <div class="belt-track track-left">
                <!-- Repeating images for seamless loop -->
                <div class="belt-item"><img src="snaps/bg1.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/gem_ej1_1.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/bg2.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/gem_hok_4.png" loading="lazy"></div>
                <!-- Duplicate for loop -->
                <div class="belt-item"><img src="snaps/bg1.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/gem_ej1_1.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/bg2.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/gem_hok_4.png" loading="lazy"></div>
            </div>
        </div>

        <!-- Loop for Middle Belt -->
        <div class="belt-row belt-middle">
            <div class="belt-track track-right">
                <div class="belt-item"><img src="snaps/gem_io2_2.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/bg2.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/gem_io2_3.png" loading="lazy"></div>
                <!-- Duplicate -->
                <div class="belt-item"><img src="snaps/gem_io2_2.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/bg2.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/gem_io2_3.png" loading="lazy"></div>
            </div>
        </div>

        <!-- Loop for Bottom Belt -->
        <div class="belt-row belt-bottom">
            <div class="belt-track track-left">
                <div class="belt-item"><img src="snaps/gem_nr3.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/bg1.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/gem_y70.png" loading="lazy"></div>
                <!-- Duplicate -->
                <div class="belt-item"><img src="snaps/gem_nr3.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/bg1.png" loading="lazy"></div>
                <div class="belt-item"><img src="snaps/gem_y70.png" loading="lazy"></div>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="main-stage">

        <!-- Phone Device -->
        <div class="iphone">
            <div class="notch">
                <div class="speaker"></div>
                <div class="camera"></div>
            </div>

            <!-- Screen 1: Incoming Call -->
            <div id="incoming-call" class="screen incoming-call active">
                <div class="call-header">
                    <div class="notification-pill">
                        <span class="live-dot"></span>
                        <span>419 online</span>
                    </div>
                </div>

                <div class="caller-info">
                    <div class="avatar-wrapper">
                        <div class="avatar-pulse"></div>
                        <img src="snaps/caller.jpg" alt="Caller">
                    </div>
                    <h1>911 for Careers</h1>
                    <p>Erocras Mobile</p>
                </div>

                <div class="call-actions">
                    <div class="action-btn" id="btn-decline">
                        <div class="btn-circle decline">?</div>
                        <span class="btn-label">Erocras</span>
                    </div>
                    <div class="action-btn" id="btn-accept">
                        <div class="btn-circle accept">📞</div>
                        <span class="btn-label">Accept</span>
                    </div>
                </div>
                <div class="home-indicator"></div>
            </div>

            <!-- Screen 2: Waitlist Chat -->
            <div id="waitlist-chat" class="screen waitlist-chat">
                <div class="chat-header">
                    <div class="back-btn" id="btn-back">‹</div>
                    <div class="chat-profile">
                        <img src="snaps/caller.jpg" alt="Profile">
                        <div class="profile-text">
                            <h2>Join the Waitlist</h2>
                            <p>419 members</p>
                        </div>
                    </div>
                </div>

                <div class="chat-body" id="chat-body">
                    <div class="date-bubble">Today</div>
                    <div class="message received">
                        <img src="snaps/caller.jpg" class="msg-avatar">
                        <div class="bubble">Type your email to join the waitlist</div>
                    </div>
                    <!-- Messages injected by JS -->
                </div>

                <div class="chat-input">
                    <div class="input-wrapper">
                        <input type="email" id="email-input" class="input-field" placeholder="Type message..."
                            autocomplete="off">
                        <div class="suggestions" id="suggestions-box"></div>
                    </div>
                    <div class="send-btn" id="btn-send">➤</div>
                </div>
                <div class="home-indicator"></div>
            </div>
        </div>

        <!-- Partners Panel (Right Side) -->
        <aside class="partners-panel">
            <h2 class="partner-heading">Our Partners</h2>
            <div class="belt-container-vertical">
                <div class="partners-track" id="partner-track">
                    <!-- Duplicated for loop effect -->
                    <img src="footer_imgs/dsp-removebg-preview.png" class="partner-logo" alt="DSP">
                    <img src="footer_imgs/ktp-removebg-preview.png" class="partner-logo" alt="KTP">
                    <img src="footer_imgs/theta_tau_vandy.png" class="partner-logo" alt="Theta Tau">
                    <img src="footer_imgs/vandy_consulting_club-removebg-preview.png" class="partner-logo" alt="VCC">
                    <!-- Repeat -->
                    <img src="footer_imgs/dsp-removebg-preview.png" class="partner-logo" alt="DSP">
                    <img src="footer_imgs/ktp-removebg-preview.png" class="partner-logo" alt="KTP">
                    <img src="footer_imgs/theta_tau_vandy.png" class="partner-logo" alt="Theta Tau">
                    <img src="footer_imgs/vandy_consulting_club-removebg-preview.png" class="partner-logo" alt="VCC">
                </div>
            </div>
        </aside>

    </main>

    <!-- Main Logic -->
    <script src="script.js"></script>
</body>

</html>
